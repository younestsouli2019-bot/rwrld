<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER | Autonomous Design Agent</title>
    <!-- Tailwind CSS for UI Overlay -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f0ff;
        }
        
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            background-color: #050505;
            color: white;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through to 3D scene */
        }

        .interactive-element {
            pointer-events: auto;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .agent-status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        .fade-in {
            animation: fadeIn 1.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>

    <!-- Import Map for Three.js and Addons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <!-- 3D Scene Container -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <main class="ui-layer w-full h-screen flex flex-col justify-between p-6 md:p-12 box-border">
        
        <!-- Header -->
        <header class="flex justify-between items-start fade-in" style="animation-delay: 0.2s;">
            <div>
                <h1 class="text-4xl md:text-6xl font-bold tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500">
                    AETHER
                </h1>
                <p class="text-xs md:text-sm text-gray-400 mt-1 uppercase tracking-widest">
                    Autonomous Design Engine v1.0
                </p>
            </div>
            
            <!-- Agent Logic Monitor -->
            <div class="interactive-element rounded-xl p-4 max-w-xs text-right hidden md:block">
                <div class="flex items-center justify-end gap-2 mb-2">
                    <span class="text-xs font-mono text-cyan-300">AGENT STATUS</span>
                    <span class="agent-status-dot"></span>
                </div>
                <p id="agent-log" class="text-xs font-mono text-gray-300 h-8 overflow-hidden transition-all duration-300">
                    Initializing core systems...
                </p>
                <div class="w-full bg-gray-800 h-1 mt-2 rounded-full overflow-hidden">
                    <div id="agent-bar" class="h-full bg-cyan-500 w-0 transition-all duration-500"></div>
                </div>
            </div>
        </header>

        <!-- Center Message (Fades out) -->
        <div id="hero-text" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center pointer-events-none fade-in" style="animation-delay: 0.5s;">
            <h2 class="text-2xl md:text-4xl font-light text-white/80">Designing Reality</h2>
        </div>

        <!-- Footer / Controls -->
        <footer class="flex justify-between items-end fade-in" style="animation-delay: 0.8s;">
            <div class="interactive-element rounded-full px-6 py-3 flex items-center gap-4">
                <span class="text-xs text-gray-300">Drag to Rotate</span>
                <span class="w-px h-4 bg-gray-600"></span>
                <span class="text-xs text-gray-300">Click to Mutate</span>
                <span class="w-px h-4 bg-gray-600"></span>
                <span class="text-xs text-cyan-400">Scroll to Zoom</span>
            </div>
            
            <button id="regenerate-btn" class="interactive-element rounded-full px-8 py-3 text-sm font-bold hover:bg-white/10 transition-colors uppercase tracking-widest text-cyan-400">
                Re-initialize
            </button>
        </footer>
    </main>

    <!-- Main Logic -->
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { SimplexNoise } from 'three/addons/math/SimplexNoise.js';

        // --- Configuration ---
        const CONFIG = {
            particleCount: 40,
            bloomStrength: 1.5,
            bloomRadius: 0.4,
            bloomThreshold: 0,
            colors: [0x00f0ff, 0xff00aa, 0xbd00ff, 0xffffff],
            speed: 0.005
        };

        // --- Agent Logic Simulator ---
        class DesignAgent {
            constructor(logElementId, barElementId) {
                this.logEl = document.getElementById(logElementId);
                this.barEl = document.getElementById(barElementId);
                this.actions = [
                    "Calculating antigravity vectors...",
                    "Optimizing mesh topology...",
                    "Applying spline interpolation...",
                    "Balancing light entropy...",
                    "Generating procedural noise...",
                    "Refracting glass materials...",
                    "Adjusting chromatic aberration..."
                ];
                this.interval = null;
                this.start();
            }

            log(message) {
                if(this.logEl) {
                    this.logEl.style.opacity = 0;
                    setTimeout(() => {
                        this.logEl.innerText = message;
                        this.logEl.style.opacity = 1;
                    }, 300);
                }
            }

            updateProgress() {
                if(this.barEl) {
                    const w = Math.random() * 100;
                    this.barEl.style.width = `${w}%`;
                }
            }

            start() {
                this.interval = setInterval(() => {
                    const action = this.actions[Math.floor(Math.random() * this.actions.length)];
                    this.log(action);
                    this.updateProgress();
                }, 2000);
            }
        }

        // --- 3D Scene Manager ---
        class SceneManager {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.mouse = new THREE.Vector2();
                this.clock = new THREE.Clock();
                this.objects = []; // Stores our floating shapes
                
                this.initScene();
                this.initPostProcessing();
                this.initLights();
                this.createObjects();
                this.addEvents();
                this.animate();
            }

            initScene() {
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x050505, 0.02);

                this.camera = new THREE.PerspectiveCamera(45, this.width / this.height, 0.1, 100);
                this.camera.position.set(0, 0, 15);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setSize(this.width, this.height);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.2;
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                
                this.container.appendChild(this.renderer.domElement);

                this.controls = new OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.maxDistance = 30;
                this.controls.minDistance = 5;
                this.controls.enablePan = false;
            }

            initPostProcessing() {
                this.composer = new EffectComposer(this.renderer);
                const renderPass = new RenderPass(this.scene, this.camera);
                this.composer.addPass(renderPass);

                const bloomPass = new UnrealBloomPass(
                    new THREE.Vector2(this.width, this.height),
                    CONFIG.bloomStrength,
                    CONFIG.bloomRadius,
                    CONFIG.bloomThreshold
                );
                this.composer.addPass(bloomPass);
            }

            initLights() {
                const ambientLight = new THREE.AmbientLight(0x404040, 2);
                this.scene.add(ambientLight);

                // Main colorful lights
                const light1 = new THREE.PointLight(0x00f0ff, 50, 20);
                light1.position.set(5, 5, 5);
                this.scene.add(light1);

                const light2 = new THREE.PointLight(0xff00aa, 50, 20);
                light2.position.set(-5, -5, 5);
                this.scene.add(light2);

                const light3 = new THREE.DirectionalLight(0xffffff, 2);
                light3.position.set(0, 10, 0);
                light3.castShadow = true;
                this.scene.add(light3);
            }

            // Create the "Spline-like" organic shapes
            createObjects() {
                // Clean up existing
                this.objects.forEach(obj => this.scene.remove(obj));
                this.objects = [];

                const geometry = new THREE.IcosahedronGeometry(1, 20); // High detail for smoothness
                
                // Spline-like material (glossy, plastic, glassy)
                const material = new THREE.MeshPhysicalMaterial({
                    color: 0x222222,
                    metalness: 0.1,
                    roughness: 0.1,
                    transmission: 0.6,  // Glass-like
                    thickness: 1.0,
                    clearcoat: 1.0,
                    clearcoatRoughness: 0.1,
                    emissive: 0x000000,
                    flatShading: false
                });

                // Create "Blobs"
                for (let i = 0; i < CONFIG.particleCount; i++) {
                    const mesh = new THREE.Mesh(geometry, material.clone());
                    
                    // Randomize appearance
                    const color = CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)];
                    mesh.material.emissive.setHex(color);
                    mesh.material.emissiveIntensity = 0.2;
                    
                    // Random Position (Antigravity field)
                    mesh.position.set(
                        (Math.random() - 0.5) * 10,
                        (Math.random() - 0.5) * 10,
                        (Math.random() - 0.5) * 5
                    );

                    // Random Scale
                    const scale = Math.random() * 0.5 + 0.2;
                    mesh.scale.set(scale, scale, scale);

                    // Store custom properties for animation
                    mesh.userData = {
                        velocity: new THREE.Vector3(
                            (Math.random() - 0.5) * 0.02,
                            (Math.random() - 0.5) * 0.02,
                            (Math.random() - 0.5) * 0.02
                        ),
                        initialScale: scale,
                        phase: Math.random() * Math.PI * 2,
                        rotationSpeed: {
                            x: (Math.random() - 0.5) * 0.01,
                            y: (Math.random() - 0.5) * 0.01
                        },
                        basePosition: mesh.position.clone()
                    };

                    mesh.castShadow = true;
                    mesh.receiveShadow = true;

                    this.scene.add(mesh);
                    this.objects.push(mesh);
                }
            }

            // Logic to animate the vertices (make them breathe like liquid)
            updateGeometry(time) {
                this.objects.forEach(mesh => {
                    const positionAttribute = mesh.geometry.attributes.position;
                    const vertex = new THREE.Vector3();
                    
                    // Only update every frame if needed, can be heavy. 
                    // For performance, we rotate and scale mostly, but let's do a slight vertex pulse
                    // A full vertex displacement on CPU for 40 objects might lag on mobile, 
                    // so we will simulate the "organic" feel via scale and position (Antigravity).
                    
                    // Organic Floating Movement
                    mesh.position.add(mesh.userData.velocity);
                    
                    // Bounce off "invisible walls" (The containment field)
                    const limit = 6;
                    if (mesh.position.x > limit || mesh.position.x < -limit) mesh.userData.velocity.x *= -1;
                    if (mesh.position.y > limit || mesh.position.y < -limit) mesh.userData.velocity.y *= -1;
                    if (mesh.position.z > limit / 2 || mesh.position.z < -limit / 2) mesh.userData.velocity.z *= -1;

                    // Mouse Interaction (Repulsion)
                    // This requires raycasting, kept simple for performance: 
                    // We'll just rotate the whole group slightly based on mouse instead for the "Parallax" feel.
                    
                    // Breathing Scale
                    const pulse = Math.sin(time * 2 + mesh.userData.phase) * 0.1 + 1;
                    mesh.scale.setScalar(mesh.userData.initialScale * pulse);

                    // Rotation
                    mesh.rotation.x += mesh.userData.rotationSpeed.x;
                    mesh.rotation.y += mesh.userData.rotationSpeed.y;
                });
            }

            addEvents() {
                window.addEventListener('resize', () => this.onResize());
                window.addEventListener('mousemove', (e) => this.onMouseMove(e));
                window.addEventListener('click', (e) => this.onClick(e));
                
                document.getElementById('regenerate-btn').addEventListener('click', (e) => {
                    e.stopPropagation(); // Prevent scene click
                    this.createObjects();
                });
            }

            onMouseMove(event) {
                this.mouse.x = (event.clientX / this.width) * 2 - 1;
                this.mouse.y = -(event.clientY / this.height) * 2 + 1;
                
                // Subtle parallax
                this.scene.rotation.x = this.mouse.y * 0.05;
                this.scene.rotation.y = this.mouse.x * 0.05;
            }

            onClick(event) {
                // "Mutate" effect on click
                this.objects.forEach(obj => {
                    // Random explosion of velocity
                    obj.userData.velocity.multiplyScalar(5); // Speed up
                    obj.material.emissiveIntensity = 2; // Flash
                    setTimeout(() => {
                        obj.material.emissiveIntensity = 0.2;
                        obj.userData.velocity.multiplyScalar(0.2); // Slow down
                    }, 300);
                });
            }

            onResize() {
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.camera.aspect = this.width / this.height;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(this.width, this.height);
                this.composer.setSize(this.width, this.height);
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                
                const time = this.clock.getElapsedTime();
                
                this.controls.update();
                this.updateGeometry(time);
                
                // Render via Composer for Bloom
                this.composer.render();
            }
        }

        // --- Initialization ---
        window.addEventListener('DOMContentLoaded', () => {
            // Start the simulated agent logic
            const agent = new DesignAgent('agent-log', 'agent-bar');
            
            // Start the 3D Scene
            const sceneManager = new SceneManager();

            // Intro Animation Logic
            setTimeout(() => {
                const hero = document.getElementById('hero-text');
                hero.style.opacity = '0';
                hero.style.transition = 'opacity 1s ease';
            }, 3000);
        });

    </script>
</body>
</html>
